<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isAndroid = /Android/i.test(ua);
        var isDesktop = !(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua));
        
        // Comprehensive check for WebView and In-App browsers to prevent white screen
        var isWebView = /wv|Median|GoNative|Instagram|FBAV|FBAN|Snapchat|Telegram/i.test(ua) 
            || (typeof window.median !== 'undefined')
            || (typeof window.gonative !== 'undefined')
            || (isAndroid && ua.indexOf('Version/') > -1);
            
        var hasFallback = window.location.search.indexOf('mfallback=1') > -1;
        var attempted = sessionStorage.getItem('intentAttempted');
        
        // Redirect to intent only if normal Android browser
        if (isAndroid && !isDesktop && !isWebView && !hasFallback && !attempted) {
          sessionStorage.setItem('intentAttempted', 'true');
          
          var host = window.location.host;
          var path = window.location.pathname;
          var query = window.location.search || "";
          
          var fallbackQuery = query ? query + "&mfallback=1" : "?mfallback=1";
          var fallbackUrl = window.location.protocol + "//" + host + path + fallbackQuery + (window.location.hash || "");
          
          var intentUrl = "intent://" + host + path + query + "#Intent;scheme=https;package=co.median.android.yezmykd;S.browser_fallback_url=" + encodeURIComponent(fallbackUrl) + ";end";
          
          window.location.replace(intentUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
